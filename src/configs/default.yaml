project:
  name: isolated_word_slr
  seed: 42
  work_dir: experiments

data:
  raw_dir: data/raw/xf500_body_color_txt
  depth_raw_dir: data/raw/xf500_body_depth_txt
  processed_dir: data/processed
  dictionary_file: data/raw/dictionary.txt
  processed_records: data/processed/isolated_word_manifest.json
  sequence_length: 32
  feature_dim: 50
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  feature_type: body_skeleton_xy

model:
  name: tcn_bilstm
  num_classes: 0
  hidden_size: 256
  tcn_channels: [64, 128]
  lstm_layers: 1
  dropout: 0.1
  input_dim: 100

train:
  batch_size: 32
  epochs: 80
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 4
  device: cuda
  log_interval: 10
  patience: 10
  scheduler: multisteplr
  milestone_epochs: [20, 35]
  gamma: 0.2

deploy:
  export_format: onnx
  export_dir: exports
