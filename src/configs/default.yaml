project:
  name: sign_translation_pc_train
  seed: 42
  work_dir: experiments

data:
  raw_dir: data/raw/CE-CSL
  processed_dir: data/processed
  label_file: data/processed/labels.json
  processed_records: data/processed/ce_csl_manifest.json
  sequence_length: 32
  feature_dim: 84
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  feature_type: mediapipe_hand_keypoints

model:
  name: tcn_bilstm
  num_classes: 10
  hidden_size: 256
  tcn_channels: [128, 256, 512]
  lstm_layers: 2
  dropout: 0.3
  input_dim: 84

train:
  batch_size: 32
  epochs: 150
  lr: 0.002
  weight_decay: 0.0001
  num_workers: 4
  device: cuda
  log_interval: 10
  lr_scheduler: cosine
  warmup_epochs: 5
  min_lr: 0.00001

deploy:
  export_format: onnx
  export_dir: exports
