project:
  name: sign_translation_pc_train
  seed: 42
  work_dir: experiments

data:
  raw_dir: data/raw/CE-CSL
  processed_dir: data/processed
  label_file: data/processed/labels.json
  processed_records: data/processed/ce_csl_manifest.json
  sequence_length: 32
  feature_dim: 84
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  feature_type: mediapipe_hand_keypoints

model:
  name: tcn_bilstm
  num_classes: 10
  hidden_size: 256      # 增大：64 -> 256
  tcn_channels: [128, 256, 256]  # 增加到3层
  lstm_layers: 2        # 增加：1 -> 2
  dropout: 0.3          # 降低：0.5 -> 0.3
  input_dim: 84

train:
  batch_size: 32
  epochs: 150           # 适度增加，配合早停
  lr: 0.0003           # 大幅降低：0.001 -> 0.0003
  weight_decay: 0.0001  # 降低正则化
  num_workers: 4
  device: cuda
  log_interval: 10
  patience: 15          # 早停耐心值
  warmup_epochs: 5      # 学习率预热
  use_scheduler: true  # 使用学习率调度器
  min_lr: 0.00001      # 最小学习率

deploy:
  export_format: onnx
  export_dir: exports
