project:
  name: sign_translation_pc_train
  seed: 42
  work_dir: experiments

data:
  raw_dir: data/raw/CE-CSL
  processed_dir: data/processed
  label_file: data/processed/labels.json
  processed_records: data/processed/ce_csl_manifest.json
  sequence_length: 32
  feature_dim: 84
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  feature_type: mediapipe_hand_keypoints
  min_token_freq: 3  # 最小词频阈值，低于此值的词会被映射到<unk>

model:
  name: tcn_bilstm
  num_classes: 10
  hidden_size: 256
  tcn_channels: [128, 256, 256]
  lstm_layers: 2
  dropout: 0.3
  input_dim: 84

train:
  batch_size: 32
  epochs: 200
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 4
  device: cuda
  log_interval: 10
  patience: 25
  warmup_epochs: 5
  use_scheduler: true
  min_lr: 0.00001

deploy:
  export_format: onnx
  export_dir: exports
